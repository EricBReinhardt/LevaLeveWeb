<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leva Leve | Alterar endereco</title>
    <meta
      name="description"
      content="Tela dedicada para alteracao de endereco de coleta."
    />
    <link rel="icon" type="image/svg+xml" href="../assets/brand-icon.svg?v=2" />
    <link rel="shortcut icon" type="image/svg+xml" href="../assets/brand-icon.svg?v=2" />
    <link rel="apple-touch-icon" href="../assets/brand-icon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#ECFDF5",
                100: "#D1FAE5",
                500: "#10B981",
                600: "#059669",
                700: "#047857",
              },
            },
            fontFamily: {
              title: ["Sora", "sans-serif"],
              body: ["DM Sans", "sans-serif"],
            },
            boxShadow: {
              card: "0 4px 14px rgba(15, 23, 42, 0.08)",
            },
          },
        },
      };
    </script>
      <script>
        window.LL_GUARD = { roles: ['client'] };
      </script>
      <script src="../assets/js/auth-precheck.js?v=1"></script>
      <script type="module" src="../assets/js/auth-guard.js?v=1"></script>
  </head>
  <body class="min-h-screen bg-slate-100 font-body text-slate-900 antialiased">
    <header class="w-full border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto flex w-full max-w-6xl items-center justify-between px-6 py-4 md:px-8">
        <a href="../index.html" class="inline-flex items-center gap-3">
          <img src="../assets/brand-icon.svg" alt="Leva Leve" class="h-9 w-9" />
          <span class="font-title text-xl font-bold tracking-tight text-brand-700">Leva Leve</span>
        </a>
        <div class="hidden items-center gap-5 text-sm text-slate-600 md:flex">
          <a href="#" class="font-medium transition hover:text-slate-900">Minhas viagens</a>
          <a href="#" class="font-medium transition hover:text-slate-900">Ajuda</a>
          <span class="h-6 w-px bg-slate-200"></span>
          <div class="text-right leading-tight">
            <p id="page-user-name" class="text-sm font-bold text-slate-900">Carregando...</p>
            <p id="page-user-email" class="text-xs text-slate-500">--</p>
          </div>
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-brand-600 text-xs font-bold text-white">JS</span>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-4xl px-6 py-10 lg:px-8">
      <div class="mb-6 flex items-center gap-3 text-sm text-slate-500">
        <a href="solicitar-transporte.html" class="font-medium hover:text-slate-700">&larr; Voltar</a>
        <span>/</span>
        <span>Alterar endereco</span>
      </div>

      <h1 class="font-title text-4xl font-extrabold tracking-tight text-slate-900">Alterar endereco</h1>
      <p class="mt-2 text-lg text-slate-600">Atualize os dados do local de coleta</p>

      <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-6 shadow-card">
        <form id="address-form" class="grid gap-4 sm:grid-cols-2">
          <label class="sm:col-span-2 block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Rua</span>
            <input id="street" type="text" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Numero</span>
            <input id="number" type="text" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Complemento</span>
            <input id="complement" type="text" placeholder="Apto, bloco, referencia..." class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Bairro</span>
            <input id="neighborhood" type="text" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Cidade</span>
            <input id="city" type="text" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Estado</span>
            <input id="state" type="text" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">CEP</span>
            <input id="zip_code" type="text" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Andar</span>
            <input id="floor" type="text" placeholder="Ex: 3" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100" />
          </label>

          <label class="block sm:col-span-2">
            <span class="mb-1 block text-sm font-semibold text-slate-600">Tem elevador?</span>
            <select id="has_elevator" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-base text-slate-800 outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-100">
              <option value="true">Sim</option>
              <option value="false">Nao</option>
            </select>
          </label>

          <div class="sm:col-span-2 mt-2 flex flex-col gap-3 sm:flex-row sm:justify-end">
            <a href="solicitar-transporte.html" class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-5 py-3 font-semibold text-slate-700 transition hover:bg-slate-50">
              Cancelar
            </a>
            <button type="submit" class="inline-flex items-center justify-center rounded-lg bg-brand-600 px-6 py-3 font-bold text-white transition hover:bg-brand-700">
              Salvar endereco
            </button>
          </div>
        </form>
      </section>
    </main>

    <script type="module">
      import { request } from '../assets/js/api.js';

      const form = document.getElementById('address-form');
      const fields = ['street', 'number', 'complement', 'neighborhood', 'city', 'state', 'zip_code', 'floor', 'has_elevator'];

      async function loadAddress() {
        try {
          const address = await request('/client/address/me');
          document.getElementById('street').value = address.street || '';
          document.getElementById('number').value = address.number || '';
          document.getElementById('complement').value = address.complement || '';
          document.getElementById('neighborhood').value = address.neighborhood || '';
          document.getElementById('city').value = address.city || '';
          document.getElementById('state').value = address.state || '';
          document.getElementById('zip_code').value = address.zip_code || '';
          document.getElementById('floor').value = address.floor || '';
          document.getElementById('has_elevator').value = String(Boolean(address.has_elevator));
        } catch (error) {
          console.warn(error.message);
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const payload = {
          street: document.getElementById('street').value.trim(),
          number: document.getElementById('number').value.trim(),
          complement: document.getElementById('complement').value.trim() || null,
          neighborhood: document.getElementById('neighborhood').value.trim(),
          city: document.getElementById('city').value.trim(),
          state: document.getElementById('state').value.trim().toUpperCase(),
          zip_code: document.getElementById('zip_code').value.trim() || null,
          floor: document.getElementById('floor').value.trim() || null,
          has_elevator: document.getElementById('has_elevator').value === 'true',
        };

        try {
          await request('/client/address/me', {
            method: 'PUT',
            body: JSON.stringify(payload),
          });
          window.location.href = 'solicitar-transporte.html';
        } catch (err) {
          // network or API error
          alert(err.message || 'Falha ao salvar o endereço. Verifique se o backend está rodando.');
        }
      });

      loadAddress();
    </script>
  </body>
</html>
